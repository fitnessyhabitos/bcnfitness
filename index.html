<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BCN Fitness V1</title>
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Russo+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
        <img src="logo.png" alt="BCN Fitness" class="pulse-logo">
        <h1 style="color:white; margin-top:20px; font-family:'Russo One'">BCN FITNESS</h1>
    </div>

    <header id="app-header" class="hidden">
        <div style="display:flex; align-items:center; gap:10px">
            <img src="logo.png" alt="Logo" style="height:30px; border-radius:50%">
            <h2 id="page-title" style="margin:0; font-size:18px">BCN FITNESS</h2>
        </div>
        <div style="display:flex; gap:10px">
            <button id="admin-btn" class="icon-btn hidden" onclick="window.app.navTo('admin')"><i class="material-icons-round" style="color:var(--neon-green)">admin_panel_settings</i></button>
            <button id="logout-btn" class="icon-btn"><i class="material-icons-round">logout</i></button>
        </div>
    </header>

    <main id="main-container">
        <section id="view-login" class="view active">
            <div class="login-wrapper" style="text-align:center; padding-top:20px">
                <img src="logo.png" alt="Logo" width="100" style="border-radius:50%; margin-bottom:20px">
                <h1 style="color:var(--neon-green)">BCN FITNESS</h1>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Contraseña" required>
                    <button type="submit" class="btn-primary">ENTRAR</button>
                </form>
            </div>
        </section>

        <section id="view-dashboard" class="view hidden">
            <div class="section-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px"><span>Objetivo Semanal</span><strong id="weekly-count" style="color:var(--neon-green)">0/0</strong></div>
                <div class="progress-bar-bg"><div id="weekly-bar" class="progress-bar-fill"></div></div>
            </div>
            <h3>Tus Rutinas / Planes</h3>
            <div id="routines-list" class="card-list"></div>
        </section>

        <section id="view-admin" class="view hidden">
            <div class="section-card"><h4>Clientes</h4><div id="admin-users-list" class="users-list-container"></div></div>
            <div class="section-card" id="routine-editor-card">
                <h4 id="routine-editor-title">Crear Plan / Rutina</h4>
                <input type="text" id="new-routine-name" placeholder="Nombre de la Rutina">
                <select id="assign-client-select"></select>
                <div class="exercise-selector" style="position:relative">
                    <input type="search" id="exercise-search" placeholder="🔍 Buscar ejercicio...">
                    <div id="search-results-container" class="hidden"></div>
                </div>
                <div id="admin-routine-preview"></div>
                <button class="btn-primary" onclick="window.admin.saveRoutine()">GUARDAR PLAN</button>
            </div>
        </section>

        <section id="view-client-detail" class="view hidden">
            <div class="workout-sticky-header">
                <button class="icon-btn" onclick="window.app.navTo('admin')"><i class="material-icons-round">arrow_back</i></button>
                <h3 id="client-detail-name">Cliente</h3>
            </div>
            <div class="section-card">
                <h4>Habilitar Módulos</h4>
                <div class="toggle-row"><span>Pliegues (JP7)</span><input type="checkbox" id="toggle-jp7" onchange="window.admin.updateModules('pliegues', this.checked)"></div>
                <div class="toggle-row"><span>Medidas Corporales</span><input type="checkbox" id="toggle-medidas" onchange="window.admin.updateModules('medidas', this.checked)"></div>
            </div>
        </section>

        <section id="view-workout" class="view hidden">
            <div class="workout-sticky-header">
                <div id="global-timer">00:00</div>
                <button onclick="window.workoutManager.openFinishModal()" class="btn-finish">TERMINAR</button>
            </div>
            <div id="active-exercises-container"></div>
        </section>
    </main>

    <div id="help-modal" class="modal-overlay hidden" onclick="this.classList.add('hidden')">
        <div class="modal-content"><img id="help-img" src="" style="width:100%; border-radius:10px"></div>
    </div>
    <div id="rest-modal" class="modal-overlay hidden">
        <div class="modal-content rest-content"><h1 id="rest-countdown">60</h1><button onclick="window.workoutManager.stopRest()" class="btn-primary">SALTAR</button></div>
    </div>
    <div id="finish-modal" class="modal-overlay hidden">
        <div class="modal-content" style="background:#111; padding:20px; border-radius:10px;">
            <h3>SESIÓN TERMINADA</h3>
            <div class="traffic-light-container">
                <button class="traffic-btn green" onclick="window.workoutManager.confirmFinish('Ligero')">😊 FÁCIL</button>
                <button class="traffic-btn orange" onclick="window.workoutManager.confirmFinish('Moderado')">😐 MEDIO</button>
                <button class="traffic-btn red" onclick="window.workoutManager.confirmFinish('Intenso')">🔥 DIFÍCIL</button>
            </div>
            <textarea id="final-notes" placeholder="Notas..."></textarea>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden">
        <div onclick="window.app.navTo('dashboard')" class="nav-item active"><i class="material-icons-round">dashboard</i><span>Inicio</span></div>
        <div onclick="window.app.navTo('profile')" class="nav-item"><i class="material-icons-round">person</i><span>Perfil</span></div>
    </nav>
    <audio id="timer-beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <script type="module" src="app.js"></script>
</body>
</html>
